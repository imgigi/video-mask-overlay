name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish portable app
        shell: pwsh
        run: |
          dotnet publish WindowsMaskOverlay/WindowsMaskOverlay.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Package zip
        shell: pwsh
        run: |
          $publish = "WindowsMaskOverlay/bin/Release/net8.0-windows/win-x64/publish"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item WindowsMaskOverlay/README.md "$publish/README.txt"
          Compress-Archive -Path "$publish/*" -DestinationPath "dist/WindowsMaskOverlay-win-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsMaskOverlay-win-x64
          path: dist/WindowsMaskOverlay-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WindowsMaskOverlay-win-x64.zip
          generate_release_notes: true
